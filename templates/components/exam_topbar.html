<!-- Exam Top Bar Component -->
<header class="sticky top-0 z-20 bg-exam-bg border-b border-exam-border px-4 md:px-8 py-3">
    <div class="flex items-center justify-between">
        <!-- Question Number -->
        <h1 class="text-xl md:text-2xl font-bold text-exam-text">Question {{ current_question|default:"1" }}</h1>

        <!-- Progress Indicators -->
        <div class="hidden md:flex items-center gap-6">
            <!-- Exam Question Progress -->
            <div class="flex flex-col items-center">
                <span class="text-xs text-exam-muted mb-1">
                    Exam Question Progress &nbsp;({{ current_question|default:"1" }}/{{ total_questions|default:"14" }})
                </span>
                <div class="w-48 h-2 bg-exam-card rounded-full overflow-hidden">
                    <div class="h-full bg-exam-accent rounded-full transition-all duration-300" 
                         style="width: {% widthratio current_question|default:1 total_questions|default:14 100 %}%"></div>
                </div>
            </div>

            <!-- Lab Progress -->
            <div class="flex flex-col items-center">
                <span class="text-xs text-exam-muted mb-1">Lab ({{ lab_current|default:"0" }}/{{ lab_total|default:"2" }})</span>
                <div class="w-32 h-2 bg-exam-card rounded-full overflow-hidden">
                    <div class="h-full bg-exam-accent rounded-full transition-all duration-300" 
                         style="width: {% widthratio lab_current|default:0 lab_total|default:2 100 %}%"></div>
                </div>
            </div>
        </div>

        <!-- Timer -->
        <div class="flex flex-col items-end">
            <div class="flex items-center gap-2 mb-1">
                <span class="text-xs font-medium text-exam-muted uppercase tracking-wider">Time Remaining</span>
                <!-- Toggle -->
                <div class="w-8 h-4 bg-exam-accent rounded-full relative cursor-pointer">
                    <div class="absolute top-0.5 right-0.5 w-3 h-3 bg-white rounded-full"></div>
                </div>
            </div>
            <div id="timer-display" class="text-2xl md:text-3xl font-bold text-exam-accent font-mono tracking-wider">
                07 : 59 : 27
            </div>
        </div>
    </div>
</header>
