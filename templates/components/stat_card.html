<!-- Stat Card Component -->
<!-- Usage: {% include "components/stat_card.html" with title="Total Students" value="1,234" icon="users" trend="+12%" trend_up=True %} -->

<div class="bg-white rounded-2xl p-5 shadow-soft hover:shadow-card transition-smooth">
    <div class="flex items-start justify-between mb-3">
        <div class="w-10 h-10 rounded-xl bg-primary-100 flex items-center justify-center">
            {% if icon == 'users' %}
            <svg class="w-5 h-5 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
            {% elif icon == 'book' %}
            <svg class="w-5 h-5 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
            {% elif icon == 'chart' %}
            <svg class="w-5 h-5 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            {% else %}
            <svg class="w-5 h-5 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
            </svg>
            {% endif %}
        </div>
        {% if trend %}
        <span class="text-xs font-medium px-2 py-0.5 rounded-full {% if trend_up %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %}">
            {{ trend }}
        </span>
        {% endif %}
    </div>
    <div class="text-2xl font-bold text-gray-900 mb-1">{{ value }}</div>
    <div class="text-sm text-gray-500">{{ title }}</div>
</div>
