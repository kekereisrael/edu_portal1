<!-- Exam List Item Component -->
<!-- Usage: {% include "components/exam_list_item.html" with day="10" month="AUGUST" title="..." description="..." time="03:00 PM" status="retake" score="F" %} -->

<div class="bg-white rounded-2xl p-4 shadow-soft hover:shadow-card transition-smooth">
    <div class="flex items-start gap-4">
        <!-- Date Badge -->
        <div class="flex-shrink-0 text-center">
            {% if status == 'retake' %}
            <span class="inline-block px-2 py-0.5 bg-red-100 text-red-600 text-[10px] font-semibold rounded-full mb-1">Retake</span>
            {% endif %}
            <div class="text-2xl font-bold text-primary-600 leading-none">{{ day }}</div>
            <div class="text-[10px] font-semibold text-primary-500 uppercase tracking-wider">{{ month }}</div>
            {% if status == 'done' %}
            <span class="inline-block px-2 py-0.5 bg-green-100 text-green-600 text-[10px] font-semibold rounded-full mt-1">Done</span>
            {% endif %}
        </div>

        <!-- Content -->
        <div class="flex-1 min-w-0">
            <h4 class="text-sm font-semibold text-gray-800 mb-1">{{ title }}</h4>
            <p class="text-xs text-gray-500 line-clamp-2">{{ description }}</p>
        </div>

        <!-- Right Side -->
        <div class="flex-shrink-0 flex flex-col items-end gap-2">
            {% if time %}
            <span class="text-xs font-medium text-gray-600">{{ time }}</span>
            {% endif %}
            {% if score %}
            <span class="text-xs font-medium">Score: <strong class="{% if score == 'F' %}text-red-600{% else %}text-green-600{% endif %}">{{ score }}</strong></span>
            {% endif %}
            <div class="w-7 h-7 rounded-full overflow-hidden">
                <img src="https://ui-avatars.com/api/?name={{ title|urlencode }}&size=28&background=e2e8f0&color=475569" 
                     alt="" class="w-full h-full object-cover">
            </div>
        </div>
    </div>
</div>
