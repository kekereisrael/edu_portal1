<!-- Button Components -->
<!-- Primary Button -->
<!-- Usage: {% include "components/button_primary.html" with text="Submit" size="md" %} -->

<button class="inline-flex items-center justify-center gap-2 
    {% if size == 'lg' %}px-6 py-3 text-base{% elif size == 'sm' %}px-3 py-1.5 text-xs{% else %}px-4 py-2.5 text-sm{% endif %}
    font-medium text-white bg-primary-500 rounded-xl 
    hover:bg-primary-600 active:bg-primary-700 
    focus:outline-none focus:ring-2 focus:ring-primary-200 
    transition-smooth shadow-sm hover:shadow-md">
    {{ text }}
</button>
