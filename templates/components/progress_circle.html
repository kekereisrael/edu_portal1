{# Progress Circle Component #}
{# Usage: include "components/progress_circle.html" with value=75 size="lg" label="A-" sublabel="GPA" #}

<div class="relative inline-flex items-center justify-center {% if size == 'lg' %}w-32 h-32{% elif size == 'sm' %}w-16 h-16{% else %}w-24 h-24{% endif %}">
    <svg class="w-full h-full" viewBox="0 0 120 120">
        <!-- Background circle -->
        <circle cx="60" cy="60" r="52" fill="white" />
        <circle cx="60" cy="60" r="48" fill="none" stroke="#e2e8f0" stroke-width="6"/>
        <!-- Progress arc -->
        <circle cx="60" cy="60" r="48" fill="none" stroke="#14b8a6" stroke-width="6" 
                stroke-dasharray="301.6" 
                stroke-dashoffset="{{ offset|default:'60' }}" 
                class="progress-circle" stroke-linecap="round"/>
    </svg>
    <div class="absolute inset-0 flex flex-col items-center justify-center">
        <span class="{% if size == 'lg' %}text-3xl{% elif size == 'sm' %}text-sm{% else %}text-xl{% endif %} font-bold text-gray-800">{{ label }}</span>
        {% if sublabel %}
        <span class="text-xs font-medium text-primary-600">{{ sublabel }}</span>
        {% endif %}
    </div>
</div>
