<!-- Course Card Component -->
<!-- Usage: {% include "components/course_card.html" with title="..." instructor="..." gpa="A+" gpa_color="green" lessons="7/10" assignments="8/12" score="A" time="25h" progress=70 %} -->

<div class="bg-white rounded-3xl shadow-card overflow-hidden hover:shadow-lg hover:-translate-y-1 transition-smooth group">
    <!-- Course Image -->
    <div class="relative h-40 {{ image_bg|default:'bg-teal-100' }} flex items-center justify-center overflow-hidden">
        <div class="w-24 h-24 bg-white/30 rounded-2xl flex items-center justify-center">
            <svg class="w-12 h-12 text-primary-600 opacity-60" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"/>
            </svg>
        </div>
        <!-- Menu button -->
        <button class="absolute top-3 right-3 w-8 h-8 bg-white/80 backdrop-blur rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-smooth">
            <svg class="w-4 h-4 text-gray-600" fill="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>
            </svg>
        </button>
    </div>

    <!-- Card Content -->
    <div class="p-5">
        <!-- Title -->
        <h3 class="text-sm font-semibold text-gray-800 leading-tight mb-3 line-clamp-2">{{ title }}</h3>

        <!-- GPA & Instructor -->
        <div class="flex items-center justify-between mb-4">
            <span class="px-2.5 py-1 text-xs font-semibold rounded-lg
                {% if gpa_color == 'green' %}bg-green-100 text-green-700
                {% elif gpa_color == 'yellow' %}bg-yellow-100 text-yellow-700
                {% elif gpa_color == 'red' %}bg-red-100 text-red-700
                {% else %}bg-gray-100 text-gray-700{% endif %}">
                GPA: {{ gpa }}
            </span>
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 rounded-full overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name={{ instructor|urlencode }}&size=24&background=e2e8f0&color=475569" 
                         alt="{{ instructor }}" class="w-full h-full object-cover">
                </div>
                <span class="text-xs text-gray-500">{{ instructor }}</span>
            </div>
        </div>

        <!-- Stats Row -->
        <div class="grid grid-cols-2 gap-2 text-xs text-gray-500 mb-4">
            <span>Lessons: <strong class="text-gray-700">{{ lessons }}</strong></span>
            <span>Assignment: <strong class="text-gray-700">{{ assignments }}</strong></span>
            <span>Last score: <strong class="text-gray-700">{{ score }}</strong></span>
            <span>Time: <strong class="text-gray-700">{{ time }}</strong></span>
        </div>

        <!-- Progress Bar -->
        <div class="relative">
            <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                <div class="h-full bg-primary-500 rounded-full transition-all duration-500" style="width: {{ progress }}%"></div>
            </div>
            <span class="absolute -top-5 text-xs font-semibold text-primary-600" style="left: {{ progress }}%">{{ progress }}%</span>
        </div>
    </div>
</div>
