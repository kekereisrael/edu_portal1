<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}University Portal{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            200: '#99f6e4',
                            300: '#5eead4',
                            400: '#2dd4bf',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e4a',
                        },
                        accent: {
                            pink: '#f472b6',
                            purple: '#a78bfa',
                        },
                        surface: {
                            bg: '#f0fdf9',
                            card: '#ffffff',
                            sidebar: '#ffffff',
                        },
                        exam: {
                            bg: '#1a2332',
                            sidebar: '#0f1923',
                            card: '#243447',
                            text: '#e2e8f0',
                            accent: '#38bdf8',
                        }
                    },
                    borderRadius: {
                        'xl': '16px',
                        '2xl': '20px',
                        '3xl': '24px',
                    },
                    boxShadow: {
                        'soft': '0 2px 15px -3px rgba(0, 0, 0, 0.07), 0 10px 20px -2px rgba(0, 0, 0, 0.04)',
                        'card': '0 4px 25px -5px rgba(0, 0, 0, 0.08)',
                        'sidebar': '4px 0 15px -3px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Sidebar active state */
        .nav-item.active {
            background: #f0fdfa;
            color: #0d9488;
            font-weight: 600;
        }
        .nav-item:hover:not(.active) {
            background: #f8fafc;
        }

        /* Progress circle */
        .progress-circle {
            transform: rotate(-90deg);
        }

        /* Smooth transitions */
        .transition-smooth {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Mobile sidebar */
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-surface-bg min-h-screen">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        {% include "components/sidebar.html" %}

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col lg:ml-[240px]">
            <!-- Top Navigation -->
            {% include "components/topnav.html" %}

            <!-- Page Content -->
            <main class="flex-1 p-4 md:p-6 overflow-y-auto">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/30 z-30 hidden lg:hidden" onclick="toggleSidebar()"></div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('hidden');
        }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
