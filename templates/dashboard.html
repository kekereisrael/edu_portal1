{% extends "base.html" %}
{% block title %}Dashboard — EduPortal{% endblock %}
{% block content %}
{# This template is kept for backward compatibility. Role-based dashboards are in dashboards/ #}
<div class="max-w-7xl mx-auto">
    <div class="text-center py-20">
        <div class="w-16 h-16 bg-primary-100 dark:bg-primary-900/30 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-primary-600 dark:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
        </div>
        <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-2">Redirecting to your dashboard...</h2>
        <p class="text-gray-500 dark:text-slate-400">Please wait.</p>

            // Auto-redirect to role-based dashboard
            setTimeout(function() {
                window.location.href = '/';
            }, 500);
        </script>
    </div>
</div>
{% endblock %}
