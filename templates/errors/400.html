<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>400 Bad Request — Examind</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: #f9fafb; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; padding: 20px; }
    .card { background: #fff; border-radius: 12px; padding: 48px 40px;
            max-width: 480px; width: 100%; text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .code { font-size: 80px; font-weight: 800; color: #1a56db; line-height: 1; }
    h1 { font-size: 24px; color: #111827; margin: 16px 0 8px; }
    p { color: #6b7280; line-height: 1.6; margin-bottom: 8px; }
    .btn { display: inline-block; margin-top: 24px; padding: 12px 28px;
           background: #1a56db; color: #fff; border-radius: 8px;
           text-decoration: none; font-weight: 600; }
    .btn:hover { background: #1e429f; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">400</div>
    <h1>Bad Request</h1>
    <p>The request could not be understood by the server due to malformed syntax.</p>
    <p>Please check your input and try again.</p>
    <a href="/" class="btn">← Go Home</a>
  </div>
</body>
</html>
