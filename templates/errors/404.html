<!DOCTYPE html>
<html lang="en" data-theme="light" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | EduPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
  <div class="text-center max-w-md mx-auto">
    <!-- Illustration -->
    <div class="relative mb-8">
      <div class="w-40 h-40 bg-primary-100 rounded-full flex items-center justify-center mx-auto">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 text-primary-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <div class="absolute -top-2 -right-2 w-12 h-12 bg-warning-100 rounded-full flex items-center justify-center mx-auto" style="right: calc(50% - 80px);">
        <span class="text-2xl">🔍</span>
      </div>
    </div>

    <!-- Error Code -->
    <div class="mb-4">
      <span class="text-8xl font-black text-gray-200 select-none">404</span>
    </div>

    <h1 class="text-2xl font-bold text-gray-900 mb-2">Page Not Found</h1>
    <p class="text-gray-500 mb-8 leading-relaxed">
      Oops! The page you're looking for doesn't exist or has been moved. Let's get you back on track.
    </p>

    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="javascript:history.back()"
        class="inline-flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl border border-gray-200 text-gray-700 font-medium text-sm hover:bg-gray-100 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Go Back
      </a>
      <a href="/"
        class="inline-flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl bg-indigo-600 text-white font-medium text-sm hover:bg-indigo-700 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Go to Dashboard
      </a>
    </div>

    <!-- Quick links -->
    <div class="mt-10 pt-6 border-t border-gray-100">
      <p class="text-xs text-gray-400 mb-3">Quick links</p>
      <div class="flex flex-wrap justify-center gap-2">
        <a href="/exams/" class="text-xs text-indigo-600 hover:underline">Exams</a>
        <span class="text-gray-300">·</span>
        <a href="/materials/" class="text-xs text-indigo-600 hover:underline">Materials</a>
        <span class="text-gray-300">·</span>
        <a href="/results/" class="text-xs text-indigo-600 hover:underline">Results</a>
        <span class="text-gray-300">·</span>
        <a href="/notifications/" class="text-xs text-indigo-600 hover:underline">Notifications</a>
      </div>
    </div>
  </div>
</body>
</html>
